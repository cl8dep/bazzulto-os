site_name: Bazzulto OS
site_description: Bazzulto Standard Library — API Reference
site_url: https://bazzulto.github.io/so/
repo_url: https://github.com/bazzulto/so
repo_name: bazzulto/so

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - tables

extra_css:
  - stylesheets/sidebar-filter.css

extra_javascript:
  - javascripts/sidebar-filter.js

hooks:
  - docs/hooks.py

plugins:
  - search

