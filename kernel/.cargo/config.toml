[build]
target = "aarch64-unknown-none"

[unstable]
build-std = ["core", "alloc", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[target.aarch64-unknown-none]
rustflags = [
    # Disable SIMD/SVE but keep fp-armv8 tied to neon as Rust requires.
    # The kernel avoids FP registers by discipline (same as -mgeneral-regs-only),
    # not by hard disabling them at the compiler level (Rust nightly rejects that).
    "-C", "target-feature=-sve",
    # Link with the Rust-specific linker script (forces _start first in .text)
    "-C", "link-arg=-Tlinker.ld",
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-static",
]
