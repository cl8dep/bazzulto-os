[package]
name    = "bzdisplayd"
version = "0.1.0"
edition = "2021"

# bzdisplayd — Bazzulto display server (v1.0: framebuffer + font rendering).
#
# Calls sys_framebuffer_map (syscall 70) to obtain exclusive access to the
# boot-time framebuffer, then initialises the font stack and acts as the
# sole writer to the display.

[[bin]]
name = "bzdisplayd"
path = "src/main.rs"

[dependencies]
bazzulto-system  = { path = "../../lib/bsl/Bazzulto.System" }
bazzulto-display = { path = "../../lib/bsl/Bazzulto.Display" }

[profile.release]
panic     = "abort"
opt-level = "s"
lto       = true
strip     = true

[profile.dev]
panic = "abort"
