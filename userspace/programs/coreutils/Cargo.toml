path = "src/bin/true.rs"

[[bin]]
name = "false"
path = "src/bin/false.rs"

[[bin]]
name = "basename"
path = "src/bin/basename.rs"

[[bin]]
name = "dirname"
path = "src/bin/dirname.rs"

[[bin]]
name = "printf"
path = "src/bin/printf.rs"

[[bin]]
name = "env"
path = "src/bin/env.rs"

[[bin]]
name = "reboot"
path = "src/bin/reboot.rs"

[[bin]]
name = "shutdown"
path = "src/bin/shutdown.rs"

[[bin]]
name = "df"
