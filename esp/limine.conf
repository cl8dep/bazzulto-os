# Limine bootloader configuration for Bazzulto OS
# Reference: https://github.com/Limine-Bootloader/Limine/blob/v11.x/CONFIG.md

# --- Boot behavior ---
# Seconds to wait before auto-booting the default entry.
# Set to "no" to disable auto-boot, or 0 to boot instantly.
timeout: 3

# --- Wallpaper ---
# Background image for the boot menu. Supports BMP, PNG, and JPEG.
# boot() refers to the partition Limine was loaded from (this ESP).
wallpaper: boot():/boot-wallpaper.jpg
# How to fit the image: "stretched" (default), "centered", or "tiled".
wallpaper_style: stretched

# --- Branding ---
# Text shown at the top of the boot menu, next to the Limine version.
interface_branding: Bazzulto OS
# Color for branding text (0-7 CGA palette index). 6 = cyan.
interface_branding_colour: 6
# Whether to hide the key-binding help bar at the top. "yes" or "no".
interface_help_hidden: no
# Color for the help text. 2 = green.
interface_help_colour: 2

# --- Terminal appearance ---
# Background color in TTRRGGBB format. TT = transparency (00=transparent, FF=opaque).
# 90 = ~56% opaque dark background, lets the wallpaper show through.
term_background: 90000020
# Foreground (text) color in RRGGBB format.
term_foreground: ffffff
# Pixel margin around the terminal area. Keeps the menu away from screen edges.
term_margin: 48
# Soft gradient (in pixels) at the terminal margin edges.
term_margin_gradient: 16

# --- Color palette ---
# Standard 8-color CGA palette (black, red, green, brown, blue, magenta, cyan, gray).
# Used for menu text, entry names, and UI elements. Semicolon-separated RRGGBB values.
term_palette: 1a1a2e;e74c3c;2ecc71;f39c12;9b59b6;e91e63;00d2d3;ecf0f1
# Bright variant of the palette (used for highlighted/bold text).
term_palette_bright: 2d2d44;ff6b6b;55efc4;feca57;c39bd3;fd79a8;48dbfb;ffffff

# --- Boot entries ---
# Each entry starts with /Name and contains protocol-specific keys indented below.
/Bazzulto OS
    protocol: limine
    kernel_path: boot():/bazzulto.elf
